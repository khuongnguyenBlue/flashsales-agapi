services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
      POSTGRES_DB: flashsale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale -d flashsale"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 2s
      timeout: 3s
      retries: 20

  # The services below depend on Prisma (Task 3) and the worker entrypoint (Task 13).
  # They are defined here so the full topology is visible from day 1; bringing them up
  # before those tasks land will fail.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: ["npx", "prisma", "migrate", "deploy"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "3000:3000"
    command: ["node", "dist/main.api.js"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    command: ["node", "dist/main.worker.js"]

volumes:
  pgdata:
